# Mount device partitions

description "Mount device partitions"

start on (startup
    and started udev)

emits mounted-android

task

script
    mkdir -p /dev/cpuset
    mount none /dev/cpuset -t cpuset -o nodev,noexec,nosuid

    /usr/sbin/mount-android.sh
    
    # prevent gralloc.default.so from being loaded by libhybris
    mount -o bind /dev/null /vendor/lib64/hw/gralloc.default.so
    
    # overlay /vendor/bin/vndservicemanager
    mount -o bind /usr/share/halium-overlay/vendor/bin/vndservicemanager /android/vendor/bin/vndservicemanager

    # Overlay recovery.img dont let falback to stock recovery
    mount -o bind /usr/share/halium-overlay/vendor/etc/recovery.img /android/vendor/etc/recovery.img

    # Overlay audio_policy_configuration.xml make phone calls work
    mount -o bind /usr/share/halium-overlay/vendor/etc/audio_policy_configuration.xml /android/vendor/etc/audio_policy_configuration.xml

    # Store updates on userdata partition since cache is too small
    umount /android/cache || true
    mkdir -p /userdata/cache
    mount -o bind /userdata/cache /android/cache
    mkdir -p /android/cache/recovery
    
    if [ -d /android/metadata ]; then
        mount -o bind /android/metadata /var/lib/lxc/android/rootfs/metadata
    fi
    initctl emit -n mounted-android
end script
